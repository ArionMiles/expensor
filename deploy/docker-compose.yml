# docker-compose.yml
#
# Start:  docker compose up -d
# Open:   http://localhost:8080
# Setup:  follow the onboarding wizard to connect Gmail or Thunderbird.
#
# Runtime data is stored in PostgreSQL. The application still imports legacy
# /app/data files at startup when that directory is mounted manually, but new
# installs do not need an application data volume.
#
# Set a custom database password with either:
#   EXPENSOR_POSTGRES_PASSWORD='change-me' docker compose up -d
# or a .env file next to this compose file:
#   EXPENSOR_POSTGRES_PASSWORD=change-me
#
# Generate an encryption key with:
#   task secrets:generate
# and set EXPENSOR_SECRET_KEY in your shell or .env file before starting.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: expensor
      POSTGRES_USER: expensor
      POSTGRES_PASSWORD: ${EXPENSOR_POSTGRES_PASSWORD:-expensor_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expensor"]
      interval: 10s
      timeout: 5s
      retries: 5

  expensor:
    image: ghcr.io/arionmiles/expensor:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: expensor
      POSTGRES_USER: expensor
      POSTGRES_PASSWORD: ${EXPENSOR_POSTGRES_PASSWORD:-expensor_password}
      POSTGRES_SSLMODE: disable
      EXPENSOR_SECRET_KEY: ${EXPENSOR_SECRET_KEY:?set EXPENSOR_SECRET_KEY with task secrets:generate}
      LOG_LEVEL: INFO
      # BASE_URL: http://localhost:8080  # Public URL Expensor is reachable at. Change this if you
      #                                  # expose on a different port (e.g. 8081:8080 -> http://localhost:8081)
      #                                  # or behind a domain/reverse proxy. Must match the redirect URI
      #                                  # registered in your Google Cloud Console OAuth client.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
    # Thunderbird only: uncomment the block below and set path to your profile.
    # volumes:
    #   - /path/to/Thunderbird/Profiles/your.profile:/thunderbird-profile:ro

volumes:
  postgres_data:
