# Docker Compose for Expensor with Thunderbird reader and PostgreSQL writer
#
# Usage:
#   THUNDERBIRD_PROFILE_PATH=/path/to/profile docker compose -f deployment/docker-compose.thunderbird-postgres.yml up -d
#
# Prerequisites:
#   - Thunderbird profile directory accessible to Docker
#   - Set THUNDERBIRD_PROFILE_PATH environment variable to your profile path
#
# Note: Thunderbird stores mail in MBOX format within profile directories.
# Common profile locations:
#   - Linux: ~/.thunderbird/<profile-id>/
#   - macOS: ~/Library/Thunderbird/Profiles/<profile-id>/
#   - Windows: %APPDATA%/Thunderbird/Profiles/<profile-id>/
#
# The rules.json and labels.json files are embedded in the binary at build time.
# See backend/cmd/server/content/ for the rule definitions.

services:
  postgres:
    image: postgres:16-alpine
    container_name: expensor-postgres
    environment:
      POSTGRES_DB: expensor
      POSTGRES_USER: expensor
      POSTGRES_PASSWORD: expensor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expensor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - expensor-network

  expensor:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: expensor-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Reader configuration
      EXPENSOR_READER: thunderbird
      THUNDERBIRD_PROFILE: /thunderbird-profile
      THUNDERBIRD_MAILBOXES: INBOX  # Comma-separated list of mailboxes to scan
      THUNDERBIRD_INTERVAL: 60               # Polling interval in seconds (default: 60)

      # Writer configuration
      EXPENSOR_WRITER: postgres

      # PostgreSQL configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: expensor
      POSTGRES_USER: expensor
      POSTGRES_PASSWORD: expensor_password
      POSTGRES_SSLMODE: disable
      POSTGRES_BATCH_SIZE: 10        # Transactions per batch (default: 10)
      POSTGRES_FLUSH_INTERVAL: 30    # Max seconds before flush (default: 30)
      POSTGRES_MAX_POOL_SIZE: 10     # Connection pool size (default: 10)

      # State file for tracking processed messages
      EXPENSOR_STATE_FILE: /app/data/state.json
    volumes:
      # Mount data directory for state file
      - ../data:/app/data
      # Mount Thunderbird profile directory (read-only)
      # Set THUNDERBIRD_PROFILE_PATH env var to your actual profile path
      - ~/Library/Thunderbird/Profiles/juxvlf84.default-release/:/thunderbird-profile:ro
    ports:
      - "8080:8080"
    networks:
      - expensor-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  expensor-network:
    driver: bridge
