info:
  contact: {}
  description: This is the generated API contract for the Expensor backend.
  title: Expensor API
  version: dev
paths:
  /auth/callback:
    get:
      parameters:
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Handle reader OAuth callback
      tags:
      - Readers
  /config/active-reader:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ActiveReaderResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get the active reader
      tags:
      - Config
  /config/banks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.BankColorResponse'
            type: array
      summary: List bank color mappings
      tags:
      - Taxonomy
  /config/buckets:
    get:
      produces:
