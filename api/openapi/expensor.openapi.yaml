      updated_at:
        type: string
    type: object
  api.DocTransactionUpdateRequest:
    properties:
      bucket:
        example: Needs
        type: string
      category:
        example: Food
        type: string
      description:
        example: Dinner order
        type: string
    type: object
  api.DocTransactionsListResponse:
    properties:
      base_currency:
        example: INR
        type: string
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_amount:
        type: number
      transactions:
        items:
          $ref: '#/definitions/api.DocTransactionResponse'
        type: array
    type: object
  api.DocTransactionsSearchResponse:
    properties:
      base_currency:
        example: INR
