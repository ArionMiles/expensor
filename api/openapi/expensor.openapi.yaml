info:
  contact: {}
  description: This is the generated API contract for the Expensor backend.
  title: Expensor API
  version: dev
paths:
  /config/active-reader:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.DocActiveReaderResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.DocErrorResponse'
      summary: Get the active reader
      tags:
      - Config
  /config/banks:
    get:
      produces:
