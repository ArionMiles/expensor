      rule_id:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      rule_name:
        example: HDFC credit card
        type: string
      sender:
        example: HDFC Bank
        type: string
      sender_email:
        example: alerts@hdfcbank.net
        type: string
      snippet:
        example: Your card was charged INR 249.50 at Swiggy
