version: '3'

tasks:
  imports:
    summary: Format imports with gci.
    desc: >-
      Format package imports in all Go files with gci.
    dir: backend
    cmd: go tool gci write ./ --section standard --section default --section "Prefix(github.com/ArionMiles)" --skip-generated --skip-vendor

  fmt:
    summary: Formats Go files including import statements.
    desc: >-
      Formats Go source files with gci for import statements and gofumpt.
    dir: backend
    deps: [ imports ]
    cmd: go tool gofumpt -l -w -extra .

  # LINTING
  lint:
    summary: Lint Go source files with golangci-lint (local config).
    desc: >-
      Lints Go source files with golangci-lint using .golangci.toml config.
      This is the lighter local configuration for development.
    dir: backend
    cmd: go tool golangci-lint --config="../.golangci.toml" run

  lint:new:
    summary: Lint only new/changed Go source files (compared to main).
    desc: >-
      Lints only new or changed Go source files compared to origin/main.
      Uses --new-from-rev to enable incremental linting adoption.
    dir: backend
    cmd: go tool golangci-lint --config="../.golangci-prod.toml" --new-from-rev=origin/main --max-same-issues=0 --max-issues-per-linter=0 run

  lint:prod:
    summary: Lint all Go source files with golangci-lint (production config).
    desc: >-
      Lints all Go source files with golangci-lint and reports all issues without
      any filtering. It uses the configuration present in .golangci-prod.toml
      for running the linter (stricter rules for CI).
    dir: backend
    cmd: go tool golangci-lint --config="../.golangci-prod.toml" --max-same-issues=0 --max-issues-per-linter=0 run

  # TESTING
  test:
    summary: Run unit tests.
    desc: Run all unit tests with verbose output.
    dir: backend
    cmd: go test -v ./...

  test:cover:
    summary: Run unit tests with coverage.
    desc: Run all unit tests with coverage report.
    dir: backend
    cmd: go test -v -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html

  # BUILD
  build:
    summary: Build the application.
    desc: Build the expensor binary.
    dir: backend
    cmd: go build -v ./...

  build:binary:
    summary: Build optimized binary for current platform.
    desc: Build a production-ready binary with version information.
    dir: backend
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    cmd: |
      CGO_ENABLED=0 go build \
        -trimpath \
        -ldflags="-s -w -X main.Version={{.VERSION}}" \
        -o ../bin/expensor \
        ./cmd/server

  build:docker:
    summary: Build Docker image locally.
    desc: Build Docker image for local platform.
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      IMAGE_NAME: "expensor:{{.VERSION}}"
    cmd: |
      docker buildx build \
        --build-arg VERSION={{.VERSION}} \
        -t {{.IMAGE_NAME}} \
        --load \
        .

  # DATABASE
  db:start:
    summary: Start the local development PostgreSQL container.
    desc: >-
      Starts the postgres:16-alpine container defined in tests/docker-compose.local.yml.
      Idempotent — safe to run when the container is already running.
      Pass RECREATE=1 to destroy the volume and recreate from scratch.
    dir: tests
    cmd: |
      if [ "${RECREATE:-0}" = "1" ]; then
        echo "Recreating dev postgres (RECREATE=1)..."
        docker compose -f docker-compose.local.yml --env-file .env down -v
      fi
      docker compose -f docker-compose.local.yml --env-file .env up -d
      echo "Waiting for postgres to be healthy..."
      until docker inspect --format '{{.State.Health.Status}}' expensor-dev-postgres 2>/dev/null | grep -q "healthy"; do
        sleep 1
      done
      echo "Postgres is healthy."

  db:stop:
    summary: Stop the local development PostgreSQL container.
    desc: Stops the dev postgres container without removing the volume.
    dir: tests
    cmd: docker compose -f docker-compose.local.yml --env-file .env stop

  # RUN
  run:
    summary: Start the backend server with local dev environment.
    desc: Run the backend server for local development, loading tests/.env.
    cmd: |
      set -a
      [ -f tests/.env ] && . tests/.env
      set +a
      cd backend && go run ./cmd/server

  run:frontend:
    summary: Start the frontend dev server.
    desc: Run the Vite dev server for local development.
    dir: frontend
    cmd: npm run dev

  dev:
    summary: Start postgres, backend, and frontend for local development.
    desc: >-
      Ensures the dev postgres container is running (idempotent), waits for it
      to be healthy, starts the backend (loading tests/.env), waits for
      /api/health, then starts the Vite dev server. Kills the backend when the
      frontend exits. Pass RECREATE=1 to wipe and recreate the postgres volume.
    cmd: |
      set -a
      [ -f tests/.env ] && . tests/.env
      set +a

      # Start postgres (idempotent)
      RECREATE=${RECREATE:-0} task db:start

      # Start backend in background
      (set -a; [ -f tests/.env ] && . tests/.env; set +a; cd backend && go run ./cmd/server) &
      BACKEND_PID=$!
      echo "Backend started (pid $BACKEND_PID), waiting for /api/health..."
      until curl -sf http://localhost:8080/api/health > /dev/null 2>&1; do
        sleep 0.5
      done
      echo "Backend is up — starting frontend"

      (cd frontend && npm run dev) || true
      kill "$BACKEND_PID" 2>/dev/null || true

  # SECURITY
  vulncheck:
    summary: Run govulncheck vulnerability scanner.
    desc: Scans Go source code for known vulnerabilities using govulncheck.
    dir: backend
    cmd: go tool govulncheck -show verbose ./...

  # CI
  ci:
    summary: Run all CI checks.
    desc: Run linting (production config) and tests for CI pipeline.
    cmds:
      - task: lint:prod
      - task: test
