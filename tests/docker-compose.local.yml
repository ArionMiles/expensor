services:
  postgres:
    image: postgres:16-alpine
    container_name: expensor-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expensor}
      POSTGRES_USER: ${POSTGRES_USER:-expensor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - expensor_dev_postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expensor}"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/jaeger:2.11.0
    container_name: expensor-dev-jaeger
    ports:
      - "16686:16686"
      - "4319:4317"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.0
    container_name: expensor-dev-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./otel-collector.local.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: expensor-dev-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

volumes:
  expensor_dev_postgres:
    driver: local
