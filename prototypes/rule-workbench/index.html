<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rule Workbench Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --panel: #11141b;
        --panel-soft: #151a23;
        --panel-strong: #1b2230;
        --border: #252b37;
        --border-strong: #384154;
        --muted: #8d98aa;
        --text: #eef2f7;
        --text-soft: #c7d0dd;
        --accent: #8b5cf6;
        --accent-strong: #a78bfa;
        --green: #22c55e;
        --red: #fb7185;
        --yellow: #f59e0b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 0%, rgba(139, 92, 246, 0.08), transparent 28rem),
          var(--bg);
        color: var(--text);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .shell {
        min-height: 100vh;
        padding: 18px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin: 0 auto 12px;
        max-width: 1440px;
      }

      .crumb {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .title-edit {
        align-items: center;
        display: inline-flex;
        max-width: min(100%, 720px);
      }

      .title-input {
        background: transparent;
        border-color: transparent;
        border-radius: 6px;
        color: var(--text);
        font-size: 22px;
        font-weight: 700;
        line-height: 1.15;
        min-width: 1ch;
        max-width: min(68vw, 720px);
        padding: 2px 3px;
        width: min(calc(var(--title-ch, 16) * 0.6em + 9px), min(68vw, 720px));
      }

      .title-input:hover {
        background: rgba(139, 92, 246, 0.14);
        border-color: transparent;
      }

      .title-input:focus {
        background: transparent;
        border-color: transparent transparent rgba(167, 139, 250, 0.9);
        border-radius: 0;
        box-shadow: none;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .badge,
      .pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text-soft);
        font-size: 12px;
        line-height: 1;
        min-height: 28px;
        padding: 7px 10px;
      }

      .badge[data-tone="predefined"] {
        border-color: rgba(167, 139, 250, 0.36);
        color: var(--accent-strong);
      }

      .button {
        align-items: center;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        font-size: 13px;
        font-weight: 600;
        justify-content: center;
        min-height: 36px;
        padding: 0 13px;
      }

      .button.primary {
        background: var(--accent);
        color: white;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-soft);
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
        gap: 16px;
        margin: 0 auto;
        max-width: 1440px;
      }

      .panel {
        background: rgba(17, 20, 27, 0.94);
        border: 1px solid var(--border);
        border-radius: 12px;
        min-width: 0;
      }

      .left-panel {
        align-self: start;
        padding: 11px;
        position: sticky;
        top: 18px;
      }

      .right-panel {
        overflow: hidden;
      }

      .section {
        border-bottom: 1px solid var(--border);
        padding: 0 0 10px;
        margin-bottom: 10px;
      }

      .section:last-child {
        border-bottom: 0;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .section-title {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        margin: 5px 0 0;
      }

      .field {
        margin-top: 7px;
      }

      label {
        color: var(--muted);
        display: block;
        font-size: 11px;
        margin-bottom: 4px;
      }

      input,
      textarea {
        background: #0d1118;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        outline: none;
        padding: 8px 10px;
        width: 100%;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(167, 139, 250, 0.7);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.14);
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .chip {
        align-items: center;
        background: #151b27;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        color: var(--text-soft);
        display: inline-flex;
        font-size: 12px;
        gap: 7px;
        min-height: 30px;
        padding: 6px 9px 6px 11px;
      }

      .chip button {
        align-items: center;
        background: transparent;
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        display: inline-flex;
        height: 18px;
        justify-content: center;
        padding: 0;
        width: 18px;
      }

      .choice-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .choice {
        background: #0d1118;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-soft);
        cursor: pointer;
        padding: 9px 10px;
        text-align: left;
      }

      .choice.active {
        border-color: rgba(167, 139, 250, 0.75);
        color: white;
        background: rgba(139, 92, 246, 0.12);
      }

      .choice small {
        color: var(--muted);
        display: block;
        font-size: 11px;
        margin-top: 3px;
      }

      .combo {
        position: relative;
      }

      .combo::after {
        color: var(--muted);
        content: "⌄";
        font-size: 14px;
        pointer-events: none;
        position: absolute;
        right: 10px;
        top: 30px;
      }

      .combo input {
        padding-right: 30px;
      }

      .combo-menu {
        background: #0d1118;
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        display: none;
        margin-top: 6px;
        max-height: 210px;
        overflow: auto;
        padding: 5px;
      }

      .combo:focus-within .combo-menu {
        display: block;
      }

      .combo-option {
        align-items: center;
        background: transparent;
        border-radius: 7px;
        color: var(--text-soft);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        min-height: 34px;
        padding: 7px 8px;
        text-align: left;
        width: 100%;
      }

      .combo-option:hover,
      .combo-option.active {
        background: var(--panel-strong);
        color: var(--text);
      }

      .combo-add {
        border-top: 1px solid var(--border);
        color: var(--accent-strong);
        display: none;
        margin-top: 4px;
      }

      .combo-option small {
        color: var(--muted);
        font-size: 11px;
      }

      .workspace-head {
        align-items: center;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
      }

      .tabs {
        display: flex;
        gap: 6px;
        min-width: 0;
        overflow-x: auto;
      }

      .sample-actions {
        align-items: center;
        display: flex;
        flex: 0 0 auto;
        gap: 8px;
      }

      .tab {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        flex: 0 0 auto;
        font-size: 12px;
        min-height: 32px;
        padding: 0 12px;
      }

      .tab.active {
        background: var(--panel-strong);
        border-color: var(--border-strong);
        color: var(--text);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 320px);
      }

      .editor {
        border-right: 1px solid var(--border);
        min-width: 0;
        padding: 14px;
      }

      .sample-meta {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr);
        gap: 10px;
        margin-bottom: 12px;
      }

      .body-editor {
        height: 390px;
        min-height: 240px;
        resize: vertical;
      }

      .inspector {
        background: rgba(21, 26, 35, 0.7);
        padding: 14px;
      }

      .result-block {
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        padding: 12px;
      }

      .result-heading {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 2px;
      }

      .result-row {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(37, 43, 55, 0.7);
        padding: 8px 0;
      }

      .result-row:last-child {
        border-bottom: 0;
      }

      .result-label {
        color: var(--muted);
        font-size: 12px;
      }

      .result-value {
        font-size: 12px;
        text-align: right;
        word-break: break-word;
      }

      .pass {
        color: var(--green);
      }

      .fail {
        color: var(--red);
      }

      .warn {
        color: var(--yellow);
      }

      .footer-status {
        align-items: center;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
      }

      @media (max-width: 980px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .top-actions {
          justify-content: flex-start;
        }

        .workbench,
        .workspace {
          grid-template-columns: 1fr;
        }

        .left-panel {
          position: static;
        }

        .editor {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .sample-meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script>
      const typeOptions = [
        { type: "credit_card", label: "Credit Card", origin: "Predefined" },
        { type: "debit_card", label: "Debit Card", origin: "Predefined" },
        { type: "upi", label: "UPI", origin: "Predefined" },
        { type: "mobile_app", label: "Mobile App", origin: "Predefined" }
      ];

      const bankOptions = [
        { bank: "HDFC", origin: "Predefined" },
        { bank: "ICICI", origin: "Predefined" },
        { bank: "Axis", origin: "Predefined" },
        { bank: "Monzo", origin: "Custom" }
      ];

      const state = {
        rule: {
          name: "HDFC Credit Card",
          savedName: "HDFC Credit Card",
          origin: "Predefined",
          sourceType: "credit_card",
          sourceLabel: "Credit Card",
          bank: "HDFC",
          senders: ["alerts@hdfcbank.bank.in", "alerts@hdfcbank.net"],
          subject: "Alert : Update on your HDFC Bank Credit Card",
          amountRegex: "Rs\\.\\s*([\\d,]+(?:\\.\\d+)?)",
          merchantRegex: "\\bat\\b (.*?) on",
          currencyRegex: ""
        },
        sampleIndex: 0,
        pendingSender: "",
        sourceTypeQuery: "",
        bankQuery: "",
        samples: [
          {
            name: "classic spend",
            sender: "alerts@hdfcbank.net",
            subject: "Alert : Update on your HDFC Bank Credit Card",
            body: "Dear Customer,\nRs.999.00 spent at SWIGGY on your HDFC Credit Card on 12-Apr-2026.",
            want: { amount: "999.00", merchant: "SWIGGY", currency: "INR" }
          },
          {
            name: "standing instruction",
            sender: "alerts@hdfcbank.bank.in",
            subject: "Alert : Update on your HDFC Bank Credit Card",
            body: "Dear Customer,\nRs. 149.00 spent at SPOTIFYINDIA on your HDFC Credit Card on 18-Apr-2026.",
            want: { amount: "149.00", merchant: "SPOTIFYINDIA", currency: "INR" }
          }
        ]
      };

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function parseEmailAddress(fromHeader) {
        const bracketMatch = String(fromHeader).match(/<([^<>@\s]+@[^<>\s]+)>/);
        if (bracketMatch) return bracketMatch[1].trim().toLowerCase();
        const directMatch = String(fromHeader).match(/([^<>\s]+@[^<>\s]+)/);
        return directMatch ? directMatch[1].trim().toLowerCase() : "";
      }

      function firstCapture(pattern, body) {
        if (!pattern) return { value: "INR", state: "default" };
        try {
          const match = new RegExp(pattern, "m").exec(body);
          if (!match) return { value: "", state: "missing" };
          const captured = match.slice(1).find((part) => part && part.trim());
          return { value: captured ? captured.trim().replaceAll(",", "") : "", state: "ok" };
        } catch (error) {
          return { value: "Invalid regex", state: "invalid" };
        }
      }

      function sample() {
        return state.samples[state.sampleIndex];
      }

      function updateRule(key, value) {
        if (key === "name") {
          const trimmed = value.trim();
          state.rule.name = trimmed || state.rule.savedName;
          render();
          return;
        }
        state.rule[key] = value;
        if (key === "sourceType") {
          const option = typeOptions.find((item) => item.type === value);
          state.rule.sourceLabel = option ? option.label : titleize(value);
        }
        render();
      }

      function amountSucceeded(result) {
        return result.state === "ok" && result.value !== "";
      }

      function merchantSucceeded(result) {
        return result.state === "ok" && result.value !== "";
      }

      function updateSample(key, value) {
        sample()[key] = value;
        render();
      }

      function updateWant(key, value) {
        sample().want[key] = value;
        render();
      }

      function updateTitleWidth(input) {
        input.style.setProperty("--title-ch", Math.max(8, input.value.length));
      }

      function saveRule() {
        const trimmed = state.rule.name.trim();
        if (!trimmed) {
          state.rule.name = state.rule.savedName;
          render();
          return;
        }
        state.rule.name = trimmed;
        state.rule.savedName = trimmed;
        render();
      }

      function commitSourceType(value) {
        const trimmed = value.trim();
        if (!trimmed) return render();
        const byType = typeOptions.find((item) => item.type === trimmed);
        const byLabel = typeOptions.find((item) => item.label.toLowerCase() === trimmed.toLowerCase());
        const match = byType || byLabel;
        if (match) {
          state.rule.sourceType = match.type;
          state.rule.sourceLabel = match.label;
          return render();
        }
        state.rule.sourceType = slug(trimmed);
        state.rule.sourceLabel = trimmed;
        if (!typeOptions.some((item) => item.type === state.rule.sourceType)) {
          typeOptions.push({ type: state.rule.sourceType, label: trimmed, origin: "Custom" });
        }
        state.sourceTypeQuery = "";
        render();
      }

      function commitBank(value) {
        const trimmed = value.trim();
        if (!trimmed) return render();
        const match = bankOptions.find((item) => item.bank.toLowerCase() === trimmed.toLowerCase());
        state.rule.bank = match ? match.bank : trimmed;
        if (!bankOptions.some((item) => item.bank.toLowerCase() === state.rule.bank.toLowerCase())) {
          bankOptions.push({ bank: state.rule.bank, origin: "Custom" });
        }
        state.bankQuery = "";
        render();
      }

      function resetSourceQueries() {
        state.sourceTypeQuery = "";
        state.bankQuery = "";
      }

      function addSample() {
        const nextNumber = state.samples.length + 1;
        state.samples.push({
          name: `new sample ${nextNumber}`,
          sender: "",
          subject: state.rule.subject,
          body: "",
          want: { amount: "", merchant: "", currency: "INR" }
        });
        state.sampleIndex = state.samples.length - 1;
        render();
      }

      function addSender() {
        const next = state.pendingSender.trim().toLowerCase();
        if (!next || state.rule.senders.includes(next)) return;
        state.rule.senders.push(next);
        state.pendingSender = "";
        render();
      }

      function removeSender(sender) {
        state.rule.senders = state.rule.senders.filter((item) => item !== sender);
        render();
      }

      function titleize(value) {
        return String(value)
          .split("_")
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function slug(value) {
        return String(value)
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
      }

      function fixtureName() {
        return `${slug(state.rule.bank)}_${slug(state.rule.sourceType)}_${slug(sample().name)}.yaml`;
      }

      function runChecks() {
        const current = sample();
        const parsedSender = parseEmailAddress(current.sender);
        const senderMatch = state.rule.senders.includes(parsedSender);
        const subjectMatch = current.subject.toLowerCase().includes(state.rule.subject.toLowerCase());
        const amount = firstCapture(state.rule.amountRegex, current.body);
        const merchant = firstCapture(state.rule.merchantRegex, current.body);
        const currency = firstCapture(state.rule.currencyRegex, current.body);
        const amountMatch = amountSucceeded(amount) && amount.value === current.want.amount;
        const merchantMatch = merchantSucceeded(merchant) && merchant.value === current.want.merchant;
        const currencyMatch = currency.value === current.want.currency;
        const allPass = senderMatch && subjectMatch && amountMatch && merchantMatch && currencyMatch;
        return { parsedSender, senderMatch, subjectMatch, amount, merchant, currency, amountMatch, merchantMatch, currencyMatch, allPass };
      }

      function statusClass(pass) {
        return pass ? "pass" : "fail";
      }

      function renderChoices(items, activeValue, key, labelKey) {
        return items
          .map((item) => {
            const value = item[key];
            const label = item[labelKey];
            const active = value === activeValue ? " active" : "";
            return `<button class="choice${active}" type="button" data-update-rule="${key}" data-value="${escapeHTML(value)}">
              ${escapeHTML(label)}
              <small>${escapeHTML(item.origin)}</small>
            </button>`;
          })
          .join("");
      }

      function renderTypeMenu() {
        const query = state.sourceTypeQuery.trim().toLowerCase();
        const filtered = typeOptions.filter((item) => {
          if (!query) return true;
          return item.type.toLowerCase().includes(query) || item.label.toLowerCase().includes(query);
        });
        const options = filtered
          .map((item) => {
            const active = item.type === state.rule.sourceType ? " active" : "";
            return `<button class="combo-option${active}" type="button" data-pick-type="${escapeHTML(item.type)}">
              <span>${escapeHTML(item.label)}</span>
              <small>${escapeHTML(item.origin)}</small>
            </button>`;
          })
          .join("");
        return options + `<button class="combo-option combo-add" type="button" data-add-type-option></button>`;
      }

      function renderBankMenu() {
        const query = state.bankQuery.trim().toLowerCase();
        const filtered = bankOptions.filter((item) => !query || item.bank.toLowerCase().includes(query));
        const options = filtered
          .map((item) => {
            const active = item.bank === state.rule.bank ? " active" : "";
            return `<button class="combo-option${active}" type="button" data-pick-bank="${escapeHTML(item.bank)}">
              <span>${escapeHTML(item.bank)}</span>
              <small>${escapeHTML(item.origin)}</small>
            </button>`;
          })
          .join("");
        return options + `<button class="combo-option combo-add" type="button" data-add-bank-option></button>`;
      }

      function typedTypeMatch(value) {
        const trimmed = value.trim().toLowerCase();
        return typeOptions.some((item) => item.type.toLowerCase().includes(trimmed) || item.label.toLowerCase().includes(trimmed));
      }

      function typedBankMatch(value) {
        const trimmed = value.trim().toLowerCase();
        return bankOptions.some((item) => item.bank.toLowerCase().includes(trimmed));
      }

      function updateAddHint(input, button, kind) {
        const value = input.value.trim();
        if (!value) {
          button.style.display = "none";
          button.textContent = "";
          return;
        }
        const exists = kind === "type" ? typedTypeMatch(value) : typedBankMatch(value);
        button.style.display = exists ? "none" : "flex";
        button.innerHTML = `Add ${escapeHTML(value)}`;
      }

      function render() {
        const current = sample();
        const checks = runChecks();
        const canSave = state.rule.name.trim() !== "";
        document.querySelector("#app").innerHTML = `
          <div class="shell">
            <header class="topbar">
              <div>
                <div class="crumb">Rules › New Rule</div>
                <div class="title-edit">
                  <input class="title-input" aria-label="Rule name" value="${escapeHTML(state.rule.name)}" data-rule-input="name" style="--title-ch:${Math.max(8, state.rule.name.length)}" />
                </div>
                <p class="subtitle">Edit the rule once, switch samples freely, and watch match/extraction status update inline.</p>
              </div>
              <div class="top-actions">
                <span class="badge" data-tone="predefined">${escapeHTML(state.rule.origin)}</span>
                <a class="button secondary" href="list.html">Rules list</a>
                <button class="button secondary" type="button">Export fixture</button>
                <button class="button primary" type="button" data-save-rule ${canSave ? "" : "disabled"}>Save rule</button>
              </div>
            </header>

            <div class="workbench">
              <aside class="panel left-panel" aria-label="Rule definition">
                <section class="section">
                  <div class="section-title">Subject Contains</div>
                  <div class="field">
                    <input id="subject" aria-label="Subject contains" value="${escapeHTML(state.rule.subject)}" data-rule-input="subject" />
                  </div>
                </section>

                <section class="section">
                  <div class="section-title">Sender</div>
                  <label>Exact sender emails</label>
                  <div class="chip-row">
                    ${state.rule.senders
                      .map(
                        (sender) => `<span class="chip mono">${escapeHTML(sender)}<button type="button" data-remove-sender="${escapeHTML(sender)}" aria-label="Remove ${escapeHTML(sender)}">x</button></span>`
                      )
                      .join("")}
                  </div>
                  <div class="field">
                    <label for="sender-input">Add sender</label>
                    <input id="sender-input" class="mono" value="${escapeHTML(state.pendingSender)}" data-pending-sender placeholder="alerts@example.com" />
                  </div>
                </section>

                <section class="section">
                  <div class="section-title">
                    <span>Extract</span>
                    <span class="badge">Go regexp syntax</span>
                  </div>
                  <p class="hint">Use Go-compatible regular expressions. Each regex should expose the target value in a capture group.</p>
                  <div class="field">
                    <label for="amount-regex">Amount regex</label>
                    <input id="amount-regex" class="mono" value="${escapeHTML(state.rule.amountRegex)}" data-rule-input="amountRegex" />
                  </div>
                  <div class="field">
                    <label for="merchant-regex">Merchant regex</label>
                    <input id="merchant-regex" class="mono" value="${escapeHTML(state.rule.merchantRegex)}" data-rule-input="merchantRegex" />
                  </div>
                  <div class="field">
                    <label for="currency-regex">Currency regex</label>
                    <input id="currency-regex" class="mono" value="${escapeHTML(state.rule.currencyRegex)}" data-rule-input="currencyRegex" placeholder="Optional" />
                  </div>
                </section>

                <section class="section">
                  <div class="section-title">Source Type</div>
                  <div class="combo">
                    <label for="source-type">Type</label>
                    <input
                      id="source-type-filter"
                      name="source-type-filter"
                      value="${escapeHTML(state.rule.sourceLabel)}"
                      data-source-type-input
                      placeholder="Credit Card"
                      autocomplete="off"
                      autocapitalize="none"
                      autocorrect="off"
                      spellcheck="false"
                      data-1p-ignore="true"
                      data-lpignore="true"
                      data-form-type="other"
                      readonly
                    />
                    <div class="combo-menu">
                      ${renderTypeMenu()}
                    </div>
                  </div>
                </section>

                <section class="section">
                  <div class="section-title">Bank</div>
                  <div class="combo">
                    <label for="source-bank">Bank</label>
                    <input
                      id="source-bank-filter"
                      name="source-bank-filter"
                      value="${escapeHTML(state.rule.bank)}"
                      data-bank-input
                      placeholder="HDFC"
                      autocomplete="off"
                      autocapitalize="none"
                      autocorrect="off"
                      spellcheck="false"
                      data-1p-ignore="true"
                      data-lpignore="true"
                      data-form-type="other"
                      readonly
                    />
                    <div class="combo-menu">
                      ${renderBankMenu()}
                    </div>
                  </div>
                </section>
              </aside>

              <section class="panel right-panel" aria-label="Rule samples">
                <div class="workspace-head">
                  <div class="tabs">
                    ${state.samples
                      .map(
                        (item, index) => `<button type="button" class="tab ${index === state.sampleIndex ? "active" : ""}" data-sample-index="${index}">${escapeHTML(item.name)}</button>`
                      )
                      .join("")}
                  </div>
                  <div class="sample-actions">
                    <button class="button secondary" type="button" data-add-sample>+ Add sample</button>
                  </div>
                </div>

                <div class="workspace">
                  <div class="editor">
                    <div class="sample-meta">
                      <div class="field" style="margin-top:0">
                        <label for="sample-name">Name</label>
                        <input id="sample-name" value="${escapeHTML(current.name)}" data-sample-input="name" />
                      </div>
                      <div class="field" style="margin-top:0">
                        <label for="sample-sender">Sender</label>
                        <input id="sample-sender" value="${escapeHTML(current.sender)}" data-sample-input="sender" />
                      </div>
                    </div>
                    <div class="field">
                      <label for="sample-subject">Subject</label>
                      <input id="sample-subject" value="${escapeHTML(current.subject)}" data-sample-input="subject" />
                    </div>
                    <div class="field">
                      <label for="sample-body">Email body</label>
                      <textarea id="sample-body" class="body-editor mono" data-sample-input="body">${escapeHTML(current.body)}</textarea>
                    </div>
                  </div>

                  <aside class="inspector">
                    <div class="section-title">Expected</div>
                    <div class="field">
                      <label for="want-amount">Amount</label>
                      <input id="want-amount" value="${escapeHTML(current.want.amount)}" data-want-input="amount" />
                    </div>
                    <div class="field">
                      <label for="want-merchant">Merchant</label>
                      <input id="want-merchant" value="${escapeHTML(current.want.merchant)}" data-want-input="merchant" />
                    </div>
                    <div class="field">
                      <label for="want-currency">Currency</label>
                      <input id="want-currency" value="${escapeHTML(current.want.currency)}" data-want-input="currency" />
                    </div>

                    <div class="result-block" style="margin-top:14px">
                      <div class="result-heading">
                        <div class="section-title" style="margin-bottom:0">Live result</div>
                        <span class="badge ${checks.allPass ? "pass" : "fail"}">${checks.allPass ? "All checks pass" : "Needs attention"}</span>
                      </div>
                      <div class="result-row">
                        <span class="result-label">Sender</span>
                        <span class="result-value ${statusClass(checks.senderMatch)}">${escapeHTML(checks.parsedSender || "none")}</span>
                      </div>
                      <div class="result-row">
                        <span class="result-label">Subject</span>
                        <span class="result-value ${statusClass(checks.subjectMatch)}">${checks.subjectMatch ? "matches" : "no match"}</span>
                      </div>
                      <div class="result-row">
                        <span class="result-label">Amount</span>
                        <span class="result-value ${checks.amount.state === "invalid" ? "warn" : statusClass(checks.amountMatch)}">${escapeHTML(checks.amount.value || "missing")}</span>
                      </div>
                      <div class="result-row">
                        <span class="result-label">Merchant</span>
                        <span class="result-value ${checks.merchant.state === "invalid" ? "warn" : statusClass(checks.merchantMatch)}">${escapeHTML(checks.merchant.value || "missing")}</span>
                      </div>
                      <div class="result-row">
                        <span class="result-label">Currency</span>
                        <span class="result-value ${checks.currency.state === "invalid" ? "warn" : statusClass(checks.currencyMatch)}">${escapeHTML(checks.currency.value || "missing")}</span>
                      </div>
                    </div>

                  </aside>
                </div>
              </section>
            </div>
          </div>
        `;

        bindEvents();
      }

      function bindEvents() {
        document.querySelectorAll("[data-rule-input]").forEach((input) => {
          if (input.classList.contains("title-input")) {
            input.addEventListener("input", () => updateTitleWidth(input));
          }
          input.addEventListener("blur", (event) => updateRule(event.target.dataset.ruleInput, event.target.value));
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              updateRule(event.target.dataset.ruleInput, event.target.value);
            }
          });
        });
        document.querySelectorAll("[data-sample-input]").forEach((input) => {
          input.addEventListener("blur", (event) => updateSample(event.target.dataset.sampleInput, event.target.value));
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && event.target.tagName !== "TEXTAREA") {
              event.preventDefault();
              updateSample(event.target.dataset.sampleInput, event.target.value);
            }
          });
        });
        document.querySelectorAll("[data-want-input]").forEach((input) => {
          input.addEventListener("blur", (event) => updateWant(event.target.dataset.wantInput, event.target.value));
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              updateWant(event.target.dataset.wantInput, event.target.value);
            }
          });
        });
        document.querySelectorAll("[data-sample-index]").forEach((button) => {
          button.addEventListener("click", () => {
            state.sampleIndex = Number(button.dataset.sampleIndex);
            render();
          });
        });
        document.querySelectorAll("[data-update-rule]").forEach((button) => {
          button.addEventListener("click", () => updateRule(button.dataset.updateRule === "type" ? "sourceType" : "bank", button.dataset.value));
        });
        document.querySelectorAll("[data-pick-type]").forEach((button) => {
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            state.sourceTypeQuery = "";
            commitSourceType(button.dataset.pickType);
          });
        });
        document.querySelectorAll("[data-pick-bank]").forEach((button) => {
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            state.bankQuery = "";
            commitBank(button.dataset.pickBank);
          });
        });
        document.querySelectorAll("[data-remove-sender]").forEach((button) => {
          button.addEventListener("click", () => removeSender(button.dataset.removeSender));
        });
        const pendingSender = document.querySelector("[data-pending-sender]");
        pendingSender.addEventListener("input", (event) => {
          state.pendingSender = event.target.value;
        });
        pendingSender.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            addSender();
          }
        });
        const sourceTypeInput = document.querySelector("[data-source-type-input]");
        const addTypeOption = document.querySelector("[data-add-type-option]");
        updateAddHint(sourceTypeInput, addTypeOption, "type");
        sourceTypeInput.addEventListener("focus", () => {
          sourceTypeInput.readOnly = false;
        });
        sourceTypeInput.addEventListener("input", () => {
          state.sourceTypeQuery = sourceTypeInput.value;
          sourceTypeInput.closest(".combo").querySelector(".combo-menu").innerHTML = renderTypeMenu();
          bindSourceMenus();
          updateAddHint(sourceTypeInput, document.querySelector("[data-add-type-option]"), "type");
        });
        sourceTypeInput.addEventListener("blur", () => {
          sourceTypeInput.readOnly = true;
          state.sourceTypeQuery = "";
          render();
        });
        sourceTypeInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const query = event.target.value.trim().toLowerCase();
            const exact = typeOptions.find((item) => item.type.toLowerCase() === query || item.label.toLowerCase() === query);
            if (exact) {
              state.sourceTypeQuery = "";
              commitSourceType(exact.type);
              return;
            }
            if (!typedTypeMatch(event.target.value)) {
              commitSourceType(event.target.value);
            }
          }
        });
        addTypeOption.addEventListener("mousedown", (event) => {
          event.preventDefault();
          commitSourceType(sourceTypeInput.value);
        });
        const bankInput = document.querySelector("[data-bank-input]");
        const addBankOption = document.querySelector("[data-add-bank-option]");
        updateAddHint(bankInput, addBankOption, "bank");
        bankInput.addEventListener("focus", () => {
          bankInput.readOnly = false;
        });
        bankInput.addEventListener("input", () => {
          state.bankQuery = bankInput.value;
          bankInput.closest(".combo").querySelector(".combo-menu").innerHTML = renderBankMenu();
          bindSourceMenus();
          updateAddHint(bankInput, document.querySelector("[data-add-bank-option]"), "bank");
        });
        bankInput.addEventListener("blur", () => {
          bankInput.readOnly = true;
          state.bankQuery = "";
          render();
        });
        bankInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            const query = event.target.value.trim().toLowerCase();
            const exact = bankOptions.find((item) => item.bank.toLowerCase() === query);
            if (exact) {
              state.bankQuery = "";
              commitBank(exact.bank);
              return;
            }
            if (!typedBankMatch(event.target.value)) {
              commitBank(event.target.value);
            }
          }
        });
        addBankOption.addEventListener("mousedown", (event) => {
          event.preventDefault();
          commitBank(bankInput.value);
        });
        document.querySelector("[data-add-sample]").addEventListener("click", addSample);
        const saveButton = document.querySelector("[data-save-rule]");
        saveButton.addEventListener("click", saveRule);
      }

      function bindSourceMenus() {
        document.querySelectorAll("[data-pick-type]").forEach((button) => {
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            state.sourceTypeQuery = "";
            commitSourceType(button.dataset.pickType);
          });
        });
        document.querySelectorAll("[data-pick-bank]").forEach((button) => {
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            state.bankQuery = "";
            commitBank(button.dataset.pickBank);
          });
        });
        const sourceTypeInput = document.querySelector("[data-source-type-input]");
        const addTypeOption = document.querySelector("[data-add-type-option]");
        if (sourceTypeInput && addTypeOption) {
          addTypeOption.addEventListener("mousedown", (event) => {
            event.preventDefault();
            commitSourceType(sourceTypeInput.value);
          });
        }
        const bankInput = document.querySelector("[data-bank-input]");
        const addBankOption = document.querySelector("[data-add-bank-option]");
        if (bankInput && addBankOption) {
          addBankOption.addEventListener("mousedown", (event) => {
            event.preventDefault();
            commitBank(bankInput.value);
          });
        }
      }

      render();
    </script>
  </body>
</html>
