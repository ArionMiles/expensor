repos:
  - repo: local
    hooks:
      - id: fmt:be
        name: Format Go code
        entry: task fmt:be
        language: system
        pass_filenames: false
        types: [go]

      - id: lint:be
        name: Lint Go code
        entry: task lint:be
        language: system
        pass_filenames: false
        types: [go]

      - id: test:be
        name: Run unit tests
        entry: task test:be
        language: system
        pass_filenames: false
        types: [go]

      - id: audit:be
        name: Check Go vulnerabilities
        entry: task audit:be
        language: system
        pass_filenames: false
        types: [go]
