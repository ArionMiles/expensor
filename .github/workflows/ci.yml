# CI workflow for linting and testing

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for --new-from-rev to work

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Extract golangci-lint version from go.mod
        id: golangci-version
        run: |
          VERSION=$(grep 'github.com/golangci/golangci-lint/v2 v' go.mod | sed 's/.*golangci-lint\/v2 //' | cut -d' ' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          only-new-issues: true
          version: ${{ steps.golangci-version.outputs.version }}
          working-directory: backend
          args: >-
            --config=../.golangci-prod.toml
            --max-same-issues=0
            --max-issues-per-linter=0

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: task lint:fe

      - name: Check formatting
        run: task fmt:fe:check

      - name: Audit dependencies
        run: task audit:fe

  test:
    name: Test (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Run tests
        run: task test:be

      - name: Run govulncheck
        run: task audit:be
