# CI workflow for linting and testing

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for --new-from-rev to work

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: Extract golangci-lint version from go.mod
        id: golangci-version
        run: |
          VERSION=$(grep 'github.com/golangci/golangci-lint/v2 v' go.mod | sed 's/.*golangci-lint\/v2 //' | cut -d' ' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci-version.outputs.version }}
          working-directory: backend
          args: >-
            --config=../.golangci-prod.toml
            --max-same-issues=0
            --max-issues-per-linter=0

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: task lint:fe

      - name: Check formatting
        run: task fmt:fe:check

      - name: Audit dependencies
        run: task audit:fe

  test-backend:
    name: Test (backend)
    runs-on: ubuntu-latest
    env:
      BACKEND_COVERAGE_MIN: '45.0'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run tests
        run: task test:be

      - name: Run backend coverage
        run: task test:be:cover

      - name: Enforce backend coverage floor
        run: task test:be:cover:check

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out

      - name: Run govulncheck
        run: task audit:be

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    env:
      FRONTEND_COVERAGE_MIN: '22.5'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: task test:fe

      - name: Run frontend coverage
        run: task test:fe:cover

      - name: Enforce frontend coverage floor
        run: task test:fe:cover:check

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage

  test-backend-component:
    name: Test (backend component)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run backend component tests
        run: task test:be:component

      - name: Print container logs
        if: failure()
        run: |
          docker logs component-backend-1 || true
          docker logs component-postgres-1 || true

      - name: Upload backend component coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-component-coverage
          path: tests/component/artifacts

  test-backend-contract:
    name: Test (backend contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run backend contract tests
        run: task test:be:contract

      - name: Print container logs
        if: failure()
        run: |
          docker logs contract-backend-1 || true
          docker logs contract-postgres-1 || true

      - name: Upload backend contract artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-contract-artifacts
          path: tests/contract/artifacts

  test-frontend-playwright:
    name: Test (frontend Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run mocked Playwright flows
        run: task test:fe:e2e

      - name: Run real-stack Playwright smoke flow
        run: task test:fe:e2e:smoke

      - name: Print container logs
        if: failure()
        run: |
          docker logs component-backend-1 || true
          docker logs component-postgres-1 || true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results

  openapi-check:
    name: OpenAPI drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Verify committed OpenAPI artifact
        run: task openapi:check
